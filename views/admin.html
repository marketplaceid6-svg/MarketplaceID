<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Dashboard Admin</title>

<link rel="stylesheet"
href="/public/css/style.css">

</head>

<body>

<div class="container">

<h1>🛡 Dashboard Admin</h1>

<div class="admin-grid">

<div class="admin-card" onclick="location.href='/admin-users'">
👥
<h3>User</h3>
<p id="userCount">0</p>
</div>

<div class="admin-card" onclick="location.href='/admin-products'">
📦
<h3>Produk</h3>
<p id="productCount">0</p>
</div>

<div class="admin-card" onclick="location.href='/admin-reports'">
🚨
<h3>Laporan</h3>
<p id="reportCount">0</p>
</div>

<div class="admin-card" onclick="location.href='/admin-verifications'">
✔️
<h3>Verifikasi</h3>
<p id="verifyCount">0</p>
</div>

<div class="admin-card" onclick="location.href='/admin-orders'">
📋
<h3>Pesanan</h3>
<p id="orderCount">0</p>
</div>

<div class="admin-card" onclick="location.href='/home'">
🏠
<h3>Kembali</h3>
</div>

<div class="admin-card"onclick="location.href='/admin-appeals'">
📨
<h3>Banding</h3>
</div>

</div>

</div>

<script src="/public/js/config.js"></script>

<script>

async function loadAdmin(){

const res=
await fetch(
API_URL + "/api/admin",
{
credentials:"include"
}
);

const data=
await res.json();

document.getElementById(
"userCount"
).innerText=
data.stats.users;

document.getElementById(
"productCount"
).innerText=
data.stats.products;

document.getElementById(
"orderCount"
).innerText=
data.stats.orders;

document.getElementById(
"reportCount"
).innerText=
data.stats.reports;

document.getElementById(
"verifyCount"
).innerText=
data.stats.verifications;

}

loadAdmin();

</script>

</body>

</html>
