<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Iklan Saya</title>

<link
rel="stylesheet"
href="/public/css/style.css"
>

</head>

<body>

<div class="container">

<h2 class="section-title">
📦 Iklan Saya
</h2>

<div id="myProducts">

<div class="empty">
Memuat produk...
</div>

</div>

</div>

<script src="/public/js/config.js"></script>

<script>

async function loadMyProducts(){

try{

const res =
await fetch(
API_URL + "/api/my-ads",
{
credentials:"include"
}
);

const data =
await res.json();

const container =
document.getElementById(
"myProducts"
);

if(
!data.products ||
data.products.length === 0
){

container.innerHTML =
`
<div class="empty">
Belum ada produk
</div>
`;

return;

}

container.innerHTML = "";

data.products.forEach(
product => {

const image =
product.images &&
product.images.length
?
product.images[0]
:
"/public/images/banner1.jpg";

container.innerHTML +=
`
<div
class="product-card"
onclick="
location.href=
'/product?id=${product.id}'
"
>

<img
class="product-image"
src="${image}"
>

<div class="product-body">

<div class="product-title">
${product.title}
</div>

<div class="product-price">
Rp ${Number(
product.price
).toLocaleString("id-ID")}
</div>

<div style="
display:flex;
gap:10px;
margin-top:10px;
">

<button
onclick="
event.stopPropagation();
location.href=
'/edit-product?id=${product.id}'
"
style="
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
"
>
✏️ Edit
</button>

<button
onclick="
event.stopPropagation();
deleteProduct(${product.id})
"
style="
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#ff3b3b;
color:white;
font-weight:bold;
"
>
🗑️ Hapus
</button>

</div>

<div class="product-location">
📍 ${
product.location ||
"Indonesia"
}
</div>

</div>

</div>
`;

});

}catch(err){

console.log(err);

alert(
"Gagal memuat iklan"
);

}

}

loadMyProducts();

async function deleteProduct(id){

const confirmDelete =
confirm(
"Hapus produk ini?"
);

if(!confirmDelete){
return;
}

try{

const res =
await fetch(
API_URL + "/api/products/" + id,
{
method:"DELETE",
credentials:"include"
}
);

const data =
await res.json();

if(data.success){

alert(
"Produk berhasil dihapus"
);

loadMyProducts();

}else{

alert(
data.message
);

}

}catch(err){

console.log(err);

alert(
"Gagal menghapus produk"
);

}

}

</script>

</body>
</html>
