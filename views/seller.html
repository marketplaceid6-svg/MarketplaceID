<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Profil Penjual</title>

<link rel="stylesheet" href="/public/css/style.css">

<style>

body{
background:#05070d;
color:white;
margin:0;
font-family:sans-serif;
padding-bottom:90px;
}

.loading{
padding:100px 20px;
text-align:center;
color:#aaa;
}

</style>

</head>

<body>

<div id="sellerPage">

<div class="loading">
Memuat profil penjual...
</div>

</div>

<script src="/public/js/config.js"></script>

<script>

const params =
new URLSearchParams(
window.location.search
);

const sellerId =
params.get("id");

async function loadSeller(){

try{

const res =
await fetch(
API_URL + "/api/seller/" + sellerId
);

const data =
await res.json();

if(!data.success){

document.getElementById(
"sellerPage"
).innerHTML =
"<div class='loading'>Penjual tidak ditemukan</div>";

return;

}

const seller =
data.seller;

const products =
data.products;

const avatar =
seller.avatar ||
"/uploads/profiles/default-avatar.png";

document.getElementById("sellerPage").innerHTML = `

<div style="
height:180px;
background:
linear-gradient(135deg,#ff3b3b,#781010);
border-radius:0 0 30px 30px;
position:relative;
">

<img
src="${avatar}"
style="
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:5px solid #05070d;
position:absolute;
left:25px;
bottom:-55px;
">

</div>

<div style="
padding:70px 20px 20px;
">

<div style="
font-size:30px;
font-weight:bold;
display:flex;
align-items:center;
gap:8px;
">

${seller.username}

${seller.verified ? "✔️" : ""}

</div>

<div style="
margin-top:8px;
color:#aaa;
font-size:16px;
">

📍 ${seller.city || "Indonesia"}

</div>

<div style="
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
">

<div style="
background:#111827;
padding:15px;
border-radius:15px;
text-align:center;
">

<div style="font-size:22px;font-weight:bold;">
${products.length}
</div>

<div style="color:#888;">
Produk
</div>

</div>

<div style="
background:#111827;
padding:15px;
border-radius:15px;
text-align:center;
">

<div style="font-size:22px;font-weight:bold;">
${data.friendCount}
</div>

<div style="color:#888;">
Teman
</div>

</div>

<div style="
background:#111827;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,59,59,.45);
">

<div style="font-size:22px;font-weight:bold;">
${data.soldCount}
</div>

<div style="color:#888;">
Terjual
</div>

</div>

</div>

<div style="
display:flex;
gap:12px;
margin-top:20px;
">

<button
id="followBtn"
onclick="followSeller()"
style="
flex:1;
height:50px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:16px;

background:${
data.isFriend
? "#2563eb"
:
data.isFollowing
? "#22c55e"
:
"#ff3b3b"
};

color:white;
">

${
data.isFriend
? "👥 Teman"
:
data.isFollowing
? "✓ Mengikuti"
:
"➕ Follow"
}

</button>

<button
onclick="
location.href='/chat?userId=${seller.id}'
"
style="
flex:1;
height:50px;
border:none;
border-radius:15px;
background:#111827;
color:white;
font-weight:bold;
font-size:16px;
">
💬 Chat
</button>

</div>

<h2 style="
margin-top:35px;
margin-bottom:15px;
">
🔥 Semua Produk
</h2>

<div
id="sellerProducts"
class="products">
Memuat...
</div>

</div>

`;

function loadSellerProducts(products){

const container =
document.getElementById("sellerProducts");

if(!products || products.length===0){

container.innerHTML =
"<div class='loading'>Belum ada produk</div>";

return;

}

container.innerHTML="";

products.forEach(product=>{

const image =
product.images &&
product.images.length
?
product.images[0]
:
"/public/images/banner1.jpg";

container.innerHTML += `
<div
class="product-card"
onclick="location.href='/product?id=${product.id}'"
>

<img
class="product-image"
src="${image}"
>

<div class="product-body">

<div class="product-title">
${product.title}
</div>

<div class="product-price">
Rp ${Number(product.price).toLocaleString("id-ID")}
</div>

<div class="product-location">
📍 ${product.location}
</div>

</div>

</div>
`;

});

}

loadSellerProducts(products);

}catch(err){

console.log(err);

}

}

async function followSeller(){

const res=
await fetch(
API_URL + "/api/follow/"+sellerId,
{
method:"POST",
credentials:"include"
}
);

const data=
await res.json();

if(data.success){

loadSeller();

}else{

alert(data.message);

}

}

loadSeller();

</script>

</body>
</html>
