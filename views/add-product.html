<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tambah Produk</title>

<link rel="stylesheet" href="/public/css/style.css">

<style>

.form-card{
background:#0f1625;
margin:15px;
padding:15px;
border-radius:20px;
border:1px solid #1f2937;
}

.form-title{
font-size:22px;
font-weight:700;
margin-bottom:15px;
}

.input{
width:100%;
padding:14px;
margin-bottom:12px;

background:#111827;
border:1px solid #1f2937;

border-radius:15px;
color:white;
}

.textarea{
height:120px;
resize:none;
}

.btn-submit{
width:100%;
padding:15px;

background:#ff3b3b;
color:white;

border:none;
border-radius:15px;

font-weight:700;
}

.upload-grid{

display:flex;
gap:10px;

margin-bottom:15px;

}

.upload-box{

width:80px;
height:80px;

background:#111827;

border:1px solid #1f2937;

border-radius:15px;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;

color:#ff3b3b;

cursor:pointer;

transition:.3s;

}

.upload-box:hover{

border-color:#ff3b3b;

box-shadow:
0 0 15px rgba(255,0,0,.2);

}

.upload-box img{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="form-title">
Tambah Produk
</div>

<div class="upload-grid">

  <label class="upload-box">
    +
    <input
      type="file"
      id="image1"
      name="images"
      hidden
      accept="image/*"
      onchange="previewImage(this)"
    >
  </label>

  <label class="upload-box">
    +
    <input
      type="file"
      id="image2"
      name="images"
      hidden
      accept="image/*"
      onchange="previewImage(this)"
    >
  </label>

  <label class="upload-box">
    ⊕
    <input
      type="file"
      id="image3"
      name="images"
      hidden
      accept="image/*"
      onchange="previewImage(this)"
    >
  </label>

</div>

<input
id="title"
name="title"
class="input"
placeholder="Nama Produk"
>

<input
id="price"
class="input"
type="number"
placeholder="Harga"
>

<select
id="category"
class="input"
>

<option>
Pilih Kategori
</option>

<option>
Elektronik
</option>

<option>
Mobil
</option>

<option>
Motor
</option>

<option>
Rumah
</option>

<option>
Lainnya
</option>

</select>

<input
id="location"
class="input"
placeholder="Lokasi"
>

<textarea
id="description"
class="input textarea"
placeholder="Deskripsi Produk"
></textarea>

<button
type="button"
class="btn-submit"
onclick="saveProduct()"
>
Simpan Produk
</button>

</div>

</div>

<script src="/public/js/config.js"></script>

<script>

async function saveProduct(){

alert("saveProduct jalan");

try{

const formData =
new FormData();

formData.append(
"title",
document.getElementById(
"title"
).value
);

formData.append(
"price",
document.getElementById(
"price"
).value
);

formData.append(
"category",
document.getElementById(
"category"
).value
);

formData.append(
"location",
document.getElementById(
"location"
).value
);

formData.append(
"description",
document.getElementById(
"description"
).value
);

const image1 =
document.getElementById(
"image1"
);

const image2 =
document.getElementById(
"image2"
);

const image3 =
document.getElementById(
"image3"
);

if(image1 && image1.files[0]){

formData.append(
"images",
image1.files[0]
);

}

if(image1 && image2.files[0]){

formData.append(
"images",
image2.files[0]
);

}

if(image1 && image3.files[0]){

formData.append(
"images",
image3.files[0]
);

}

console.log("Kirim produk...");

const res =
await fetch(
API_URL + "/api/products",
{
method:"POST",
body:formData
}
);

console.log("Response diterima");

const data =
await res.json();

if(data.success){

alert(
"Produk berhasil ditambahkan"
);

window.location.href =
"/home";

}else{

alert(
data.message ||
"Gagal menambah produk"
);

}

}catch(err){

console.error(err);

alert(
err.message
);

}

} // <- tutup saveProduct

function previewImage(input){

const box =
input.parentElement;

const file =
input.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(e){

box.style.backgroundImage =
`url(${e.target.result})`;

box.style.backgroundSize =
"cover";

box.style.backgroundPosition =
"center";

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
