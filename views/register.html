<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - MarketplaceID</title>

<link rel="stylesheet" href="/public/css/style.css">
</head>

<body>

<div class="container">

<div class="auth-card">

<div class="auth-logo">
👤
</div>

<h1>
Buat <span>Akun Baru</span>
</h1>

<p class="auth-subtitle">
Lengkapi data diri untuk memulai
perjalanan jual beli kamu
</p>

<input
id="username"
type="text"
placeholder="Username"
>

<input
id="email"
type="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<input
id="confirmPassword"
type="password"
placeholder="Konfirmasi Password"
>

<div class="security-box">

<div class="security-icon">
🛡️
</div>

<div>

<b>
Akun kamu aman bersama kami
</b>

<br>

Kami tidak akan membagikan
data pribadi kamu.

</div>

</div>

<button
type="button"
onclick="registerUser()">
Daftar Sekarang →
</button>

<p class="auth-link">
Sudah punya akun?
<a href="/login">
Masuk di sini
</a>
</p>

<div class="auth-features">

<div>
👤 Mudah
</div>

<div>
🔒 Aman
</div>

<div>
💎 Gratis
</div>

</div>

</div>

<script src="/public/js/config.js"></script>

<script>

async function registerUser(){

const username =
document.getElementById(
"username"
).value;

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

const res =
await fetch(
API_URL + "/api/register",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
username,
email,
password
})
}
);

const data =
await res.json();

alert(
data.message
);

if(data.success){

window.location.href =
"/login";

}

}

</script>

</body>
</html>
