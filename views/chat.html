<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Chat</title>

<link
rel="stylesheet"
href="/public/css/style.css"
>

<style>

.messages{
padding-bottom:80px;
}

.message{
max-width:80%;
padding:10px;
margin:8px;
border-radius:12px;
}

.me{
background:#ff3030;
margin-left:auto;
}

.other{
background:#1f2937;
}

.chat-bar{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:#0b0f19;
border-top:1px solid #1f2937;
}

.chat-input{
flex:1;
height:46px;
background:#0f172a;
border:2px solid #ff2d2d;
border-radius:16px;
padding:0 15px;
color:white;
font-size:16px;
outline:none;
box-shadow:
0 0 10px rgba(255,45,45,.2);
}

.chat-header{
display:flex;
align-items:center;
gap:12px;
padding:15px;
border-bottom:1px solid #1f2937;
background:#0b0f19;
position:sticky;
top:0;
z-index:100;
}

.attach-btn{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#ff3030;
color:white;
font-size:20px;
box-shadow:
0 0 8px rgba(255,0,0,.25);
}

#attachMenu{
display:none;
position:fixed;
bottom:75px;
left:15px;
background:linear-gradient(
135deg,
#140000,
#2a0000,
#3b0000
);
border:1px solid #ff3030;
border-radius:18px;
padding:10px;
box-shadow:
0 0 25px rgba(255,48,48,.4);
z-index:999;
min-width:180px;
}

.attach-item{
padding:14px;
font-size:18px;
color:white;
border-radius:12px;
}

.attach-item:hover{
background:rgba(
255,
255,
255,
0.1
);
}

.attach-item:last-child{
border-bottom:none;
}

.send-btn{
width:46px;
height:46px;
border:none;
border-radius:16px;
background:linear-gradient(
135deg,
#ff2d2d,
#b30000
);
color:white;
font-size:20px;
font-weight:bold;
box-shadow:
0 0 15px rgba(255,0,0,.4);
}

.chat-input::placeholder{
color:#ff9d9d;
}

.product-chat-card{
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #ff2d2d;
cursor:pointer;
font-weight:bold;
}

.reply-preview{
border-left:3px solid #ff2d2d;
background:rgba(255,255,255,.05);
padding:8px 10px;
margin-bottom:8px;
border-radius:8px;
font-size:13px;
color:#ffb3b3;
}

</style>

</head>
<body>

<div class="chat-header">

<img
id="chatAvatar"
src="/uploads/profiles/default-avatar.png"
style="
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
">

<div>

<div
id="chatName"
style="
font-weight:bold;
font-size:18px;
"
>
Loading...
</div>

<div
id="chatStatus"
style="
font-size:12px;
color:#9ca3af;
"
>
Memuat...
</div>

<div
id="typingStatus"
style="
font-size:12px;
color:#22c55e;
display:none;
"
>
⌨ Sedang mengetik...
</div>

</div>

</div>

<div
id="productInfo"
style="
display:none;
margin:10px;
padding:12px;
background:#111827;
border-radius:12px;
"
>
</div>

<div
id="messages"
class="messages"
></div>

<div
id="attachMenu"
style="
display:none;
padding:15px;
background:#111827;
border-top:1px solid #1f2937;
"
>

<div
onclick="
document
.getElementById(
'chatImage'
)
.click()
"
style="padding:10px;"
>
🖼 Foto
</div>

<div
onclick="shareProduct()"
style="padding:10px;"
>
📦 Produk
</div>

<div
onclick="sendLocation()"
style="padding:10px;"
>
📍 Lokasi
</div>

</div>

<input
type="file"
id="chatImage"
accept="image/*"
style="display:none"
onchange="uploadImage()"
>

<input
type="file"
id="chatCamera"
accept="image/*"
capture="environment"
style="display:none"
onchange="uploadImageFromCamera(this)"
>

<div
id="replyBox"
style="
display:none;
padding:10px;
background:#111827;
border-top:2px solid #ff2d2d;
"
>

<div
id="replyText"
style="
font-size:13px;
color:#ffb3b3;
"
>
</div>

<div
onclick="cancelReply()"
style="
float:right;
cursor:pointer;
"
>
✖
</div>

</div>

<div class="chat-bar">

<button
class="attach-btn"
onclick="toggleAttach()"
>
📎
</button>

<button
class="attach-btn"
onclick="
document
.getElementById(
'chatCamera'
)
.click()
"
>
📷
</button>

<input
id="message"
class="input chat-input"
placeholder="Ketik pesan..."
oninput="typing()"
>

<button
class="send-btn"
onclick="sendMessage()"
>
➤
</button>

</div>

<script src="/public/js/config.js"></script>

<script>

const params =
new URLSearchParams(
location.search
);

const userId =
params.get("userId");

const productId =
params.get("productId");

let typingTimeout;

let lastMessageCount = 0;

let replyMessage = null;

async function loadMessages(){

const res =
await fetch(
API_URL + "/api/chat/" + userId,
{
credentials:"include"
}
);

const data =
await res.json();

if(
lastMessageCount > 0 &&
data.messages.length >
lastMessageCount
){

showNotification(
"💬 Pesan baru masuk"
);

}

lastMessageCount =
data.messages.length;

const newCount =
data.messages.length;

if(
window.lastMessageCount ===
newCount
){
return;
}

window.lastMessageCount =
newCount;

if(
data.productId
){

loadProductInfo(
data.productId
);

}

const box =
document.getElementById(
"messages"
);

box.innerHTML="";

data.messages.forEach(msg=>{

let content = msg.message;

if(
msg.message.includes(
"[REPLY]"
)
){

const replied =
msg.message.match(
/\[REPLY\](.*?)\[\/REPLY\]/
);

const replyText =
replied
?
replied[1]
:
"";

const realMessage =
msg.message.replace(
/\[REPLY\].*?\[\/REPLY\]/,
""
);

content = `
<div style="
border-left:3px solid #ff2d2d;
padding-left:10px;
margin-bottom:8px;
opacity:.85;
font-size:13px;
color:#ffb3b3;
">

↩ ${replyText}

</div>

<div>

${realMessage}

</div>
`;

}

if(
msg.message.startsWith(
"[IMAGE]"
)
){

content = `
<img
src="${
msg.message.replace(
"[IMAGE]",
""
)
}"
onclick="
openImage(this.src)
"
style="
max-width:220px;
border-radius:12px;
cursor:pointer;
"
>
`;

}else if(
msg.message.startsWith(
"[LOCATION]"
)
){

const coords =
msg.message.replace(
"[LOCATION]",
""
);

const parts =
coords.split(",");

const lat =
parts[0];

const lng =
parts[1];

content = `
<a
href="
https://maps.google.com/?q=${lat},${lng}
"
target="_blank"
style="
display:block;
padding:15px;
background:#111827;
border-radius:12px;
border:1px solid #ff2d2d;
color:white;
text-decoration:none;
"
>
📍 Lihat Lokasi
</a>
`;

}else if(
msg.message.startsWith(
"[OFFER]"
)
){

const offerId =
msg.message.replace(
"[OFFER]",
""
);

content = `
<div
id="offer-${offerId}"
style="
padding:15px;
background:#111827;
border:1px solid #22c55e;
border-radius:12px;
"
>

💰 Penawaran Harga

</div>
`;

setTimeout(
()=>loadOffer(
offerId
),
100
);

}else if(
msg.message.startsWith(
"[PRODUCT]"
)
){

content = `
<div
class="product-chat-card"
onclick="
location.href=
'/product?id=${
msg.message.replace(
'[PRODUCT]',
''
)
}'
"
>
📦 Produk
</div>
`;

}

box.innerHTML += `
<div class="
message
${msg.fromUserId==userId
? 'other'
: 'me'}
">

<div
onclick="
openMessageMenu(
'${msg.id}',
'${String(msg.message)
.replace(/'/g,'\\\'')
.replace(/\n/g,' ')}'
)
"
>

${content}

</div>

<div style="
font-size:11px;
opacity:.7;
margin-top:5px;
text-align:right;
">

${new Date(
msg.createdAt
).toLocaleTimeString(
"id-ID",
{
hour:"2-digit",
minute:"2-digit"
}
)}

${
msg.fromUserId != userId
?
(
msg.read
?
'<span style="color:#4fc3f7;">✓✓</span>'
:
'✓'
)
:
''
}

</div>

</div>
`;

});

}

async function sendMessage(){

const text =
document.getElementById(
"message"
).value;

if(!text) return;

await fetch(
API_URL + "/api/chat/send",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId,
productId:productId,
message:
replyMessage
?
"[REPLY]" +
replyMessage +
"[/REPLY]" +
text
:
text
})
}
);

document.getElementById(
"message"
).value="";

cancelReply();

loadMessages();

}

async function uploadImage(){

const file =
document.getElementById(
"chatImage"
).files[0];

if(!file) return;

const form =
new FormData();

form.append(
"image",
file
);

const upload =
await fetch(
API_URL + "/api/chat/upload",
{
method:"POST",
credentials:"include",
body:form
}
);

const result =
await upload.json();

if(!result.success)
return;

await fetch(
API_URL + "/api/chat/send",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId,
productId:productId,
message:
"[IMAGE]" +
result.image
})
}
);

loadMessages();

}

async function uploadImageFromCamera(input){

const file =
input.files[0];

if(!file) return;

const form =
new FormData();

form.append(
"image",
file
);

const upload =
await fetch(
API_URL + "/api/chat/upload",
{
method:"POST",
credentials:"include",
body:form
}
);

const result =
await upload.json();

if(!result.success)
return;

await fetch(
API_URL + "/api/chat/send",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId,
productId:productId,
message:
"[IMAGE]" +
result.image
})
}
);

loadMessages();

}

async function shareProduct(){

const res =
await fetch(
API_URL + "/api/my-products",
{
credentials:"include"
}
);

const data =
await res.json();

let html = "";

data.products.forEach(p=>{

html += `
<div
onclick="
sendProduct(
${p.id}
)
"
style="
padding:12px;
border-bottom:
1px solid #333;
"
>
📦 ${p.title}
<br>
<small>
Rp ${Number(
p.price
).toLocaleString(
"id-ID"
)}
</small>
</div>
`;

});

document.getElementById(
"attachMenu"
).innerHTML =
html;

document.getElementById(
"attachMenu"
).style.display =
"block";

}

async function sendLocation(){

if(
!navigator.geolocation
){

alert(
"GPS tidak didukung"
);

return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

await fetch(
API_URL + "/api/chat/send",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId,
message:
"[LOCATION]" +
lat +
"," +
lng
})
}
);

loadMessages();

toggleAttach();

},

()=>{
alert(
"Gagal mengambil lokasi"
);
}

);

}

async function sendProduct(
id
){

await fetch(
API_URL + "/api/chat/send",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId,
message:
"[PRODUCT]" + id
})
}
);

toggleAttach();

loadMessages();

}

function toggleAttach(){

const menu =
document.getElementById(
"attachMenu"
);

if(
menu.style.display ===
"block"
){

menu.style.display =
"none";

}else{

menu.style.display =
"block";

}

}

function openMessageMenu(
messageId,
message
){

const action =
prompt(
"1 = Balas\n2 = Salin\n3 = Hapus"
);

if(action == "1"){

replyToMessage(
message
);

}

else if(
action == "2"
){

navigator.clipboard.writeText(
message
);

alert(
"Pesan disalin"
);

}

else if(
action == "3"
){

deleteMessage(
messageId
);

}

}

async function deleteMessage(
messageId
){

if(
!confirm(
"Hapus pesan?"
)
){
return;
}

await fetch(
API_URL + "/api/chat/delete/" +
messageId,
{
method:"DELETE",
credentials:"include"
}
);

loadMessages();

}

function showNotification(
text
){

const old =
document.getElementById(
"chatNotif"
);

if(old){
old.remove();
}

const notif =
document.createElement(
"div"
);

notif.id =
"chatNotif";

notif.innerText =
text;

notif.style.cssText = `
position:fixed;
top:80px;
left:50%;
transform:translateX(-50%);
background:#ff2d2d;
color:white;
padding:12px 18px;
border-radius:12px;
z-index:9999;
font-weight:bold;
box-shadow:
0 0 20px rgba(255,0,0,.5);
`;

document.body.appendChild(
notif
);

setTimeout(
()=>{
notif.remove();
},
2500
);

}

async function loadUser(){

try{

const res =
await fetch(
API_URL + "/api/user/" + userId,
{
credentials:"include"
}
);

const data =
await res.json();

console.log(data);

if(!data.success)
return;

document.getElementById(
"chatName"
).innerText =
data.user.username;

document.getElementById(
"chatAvatar"
).src =
data.user.avatar ||
"/uploads/profiles/default-avatar.png";

if(data.user.online){

document.getElementById(
"chatStatus"
).innerHTML =
"🟢 Online";

}else{

const lastActive =
new Date(
data.user.lastActive
);

document.getElementById(
"chatStatus"
).innerText =
"⚫ Terakhir aktif " +
lastActive.toLocaleTimeString(
"id-ID",
{
hour:"2-digit",
minute:"2-digit"
}
);

}

}catch(err){

console.log(err);

}

}

async function
loadProductInfo(
productId
){

if(!productId)
return;

const res =
await fetch(
API_URL + "/api/product-info/" +
productId
);

const data =
await res.json();

if(
!data.product
)
return;

document.getElementById(
"productInfo"
).style.display =
"block";

document.getElementById(
"productInfo"
).innerHTML =
`
📦 <b>
${data.product.title}
</b>

<br>

Rp ${Number(
data.product.price
).toLocaleString(
"id-ID"
)}
`;
}

function replyToMessage(
message
){

replyMessage =
message;

document.getElementById(
"replyBox"
).style.display =
"block";

document.getElementById(
"replyText"
).innerText =
message;

}

function cancelReply(){

replyMessage = null;

document.getElementById(
"replyBox"
).style.display =
"none";

}

async function loadOffer(
offerId
){

const res =
await fetch(
API_URL + "/api/offer/" +
offerId,
{
credentials:"include"
}
);

const data =
await res.json();

if(
!data.success
)
return;

const offer =
data.offer;

const myUserId =
data.myUserId;

const box =
document.getElementById(
"offer-" +
offerId
);

if(!box)
return;

box.innerHTML = `
💰 Penawaran Harga

<br><br>

Rp ${Number(
offer.price
).toLocaleString(
"id-ID"
)}

<br><br>

Status:
${offer.status}

${
offer.status === "pending"
&&
myUserId === offer.sellerId
?
`
<br><br>

<button
onclick="
acceptOffer(
${offer.id}
)
"
>
✅ Terima
</button>

<button
onclick="
rejectOffer(
${offer.id}
)
"
>
❌ Tolak
</button>
`
:
""
}
`;

}

async function typing(){

await fetch(
API_URL + "/api/chat/typing",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId
})
}
);

clearTimeout(
typingTimeout
);

typingTimeout =
setTimeout(
stopTyping,
2000
);

}

async function stopTyping(){

await fetch(
API_URL + "/api/chat/stop-typing",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
toUserId:userId
})
}
);

async function checkTyping(){

const res =
await fetch(
API_URL + "/api/chat/typing/" +
userId,
{
credentials:"include"
}
);

const data =
await res.json();

document.getElementById(
"typingStatus"
).style.display =
data.typing
?
"block"
:
"none";

}}

loadUser();

loadProductInfo(
productId
);

loadMessages();

setInterval(
loadMessages,
3000
);

setInterval(
loadUser,
10000
);

setInterval(
checkTyping,
1000
);

async function acceptOffer(
offerId
){

await fetch(
API_URL + "/api/offer/status",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
offerId,
status:
"accepted"
})
}
);

loadMessages();

}

async function rejectOffer(
offerId
){

await fetch(
API_URL + "/api/offer/status",
{
method:"POST",
credentials:"include",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
offerId,
status:
"rejected"
})
}
);

loadMessages();

}

function openImage(src){

document.getElementById(
"viewerImg"
).src = src;

document.getElementById(
"imageViewer"
).style.display =
"flex";

}

function closeImage(){

document.getElementById(
"imageViewer"
).style.display =
"none";

}

</script>

<div
id="imageViewer"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
z-index:9999;
justify-content:center;
align-items:center;
"
onclick="closeImage()"
>

<img
id="viewerImg"
style="
max-width:95%;
max-height:95%;
border-radius:12px;
"
>

</div>

</body>
</html>
